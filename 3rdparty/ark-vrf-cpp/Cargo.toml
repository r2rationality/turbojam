[package]
name = "ark-vrf-cpp"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
hex = "0.4"
ark-vrf = { git = "https://github.com/davxy/ark-vrf", rev = "v0.2.2", features = ["bandersnatch", "ring"] }

# On Linux/macOS (GAS toolchain available) also enable hand-written Montgomery
# multiplication assembly. Cargo unions features, so the base set above is
# always present and "asm" is added on top on Unix targets only.
[target.'cfg(unix)'.dependencies]
ark-vrf = { git = "https://github.com/davxy/ark-vrf", rev = "v0.2.2", features = ["asm"] }

[dev-dependencies]
once_cell = "1.19" 

[profile.release]
codegen-units = 1   # single CGU for maximum cross-function inlining
lto = "thin"        # thin LTO across all crates; safe with staticlib consumers

[lib]
crate-type = ["staticlib"]